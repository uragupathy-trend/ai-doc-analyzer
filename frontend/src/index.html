<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Document Analyzer</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { color: #d32f2f; }
    .card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    input[type=file], textarea { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
    button { background: #d32f2f; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #b71c1c; }
    .result { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 16px; border-radius: 4px; white-space: pre-wrap; }
    .blocked { background: #ffebee; border-left: 4px solid #f44336; padding: 16px; border-radius: 4px; }
    .guard-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin: 4px; }
    .allow { background: #c8e6c9; color: #2e7d32; }
    .block { background: #ffcdd2; color: #c62828; }
    .loading { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <h1>AI Document Analyzer</h1>
  <p>Powered by AWS Bedrock &amp; protected by Vision One AI App Guard</p>

  <div class="card">
    <h2>Upload Document</h2>
    <input type="file" id="fileInput" accept=".txt,.md,.csv,.json" />
    <textarea id="question" rows="3" placeholder="Ask a question about the document (e.g. Summarize the key points)">Summarize this document and identify key topics.</textarea>
    <br/>
    <button onclick="analyze()">Analyze</button>
  </div>

  <div id="output"></div>

  <script>
    const API = window.location.hostname === 'localhost'
      ? 'http://localhost:8000'
      : '/api';

    async function analyze() {
      const file = document.getElementById('fileInput').files[0];
      const question = document.getElementById('question').value;
      const output = document.getElementById('output');

      if (!file) { alert('Please select a file'); return; }

      output.innerHTML = '<p class="loading">Scanning prompt with AI App Guard... then calling Bedrock...</p>';

      const form = new FormData();
      form.append('file', file);
      form.append('question', question);

      try {
        const resp = await fetch(`${API}/analyze`, { method: 'POST', body: form });
        const data = await resp.json();

        if (!resp.ok) {
          output.innerHTML = `
            <div class="card blocked">
              <h3>Blocked by AI App Guard</h3>
              <p>${data.detail?.error || 'Request blocked'}</p>
              <ul>${(data.detail?.reasons || []).map(r => `<li>${r}</li>`).join('')}</ul>
            </div>`;
          return;
        }

        output.innerHTML = `
          <div class="card">
            <h3>Analysis Result</h3>
            <p>
              Prompt guard: <span class="guard-badge ${data.guard_prompt.action === 'Allow' ? 'allow' : 'block'}">${data.guard_prompt.action}</span>
              Response guard: <span class="guard-badge ${data.guard_response.action === 'Allow' ? 'allow' : 'block'}">${data.guard_response.action}</span>
              Model: <code>${data.model}</code>
            </p>
            <div class="result">${data.analysis}</div>
          </div>`;
      } catch (e) {
        output.innerHTML = `<div class="card blocked"><h3>Error</h3><p>${e.message}</p></div>`;
      }
    }
  </script>
</body>
</html>
