server {
    listen 80;

    location /api/ {
        proxy_pass http://ai-doc-analyzer-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
